<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Assistant{% if title %} — {{ title }}{% endif %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="sidebar-brand">
                <h1>Research Assistant</h1>
                <p class="subtitle">Master's Thesis Toolkit</p>
            </div>
            <ul class="nav-links">
                <li><a href="/" class="nav-item">Dashboard</a></li>
                <li><a href="/ask" class="nav-item">Ask a Question</a></li>
                <li><a href="/compare" class="nav-item">Compare Models</a></li>
                <li><a href="/sessions" class="nav-item">Sessions</a></li>
                <li><a href="/index" class="nav-item">Manage Index</a></li>
            </ul>
            <div class="sidebar-footer">
                <p class="dim">Research Assistant v1.0</p>
            </div>
        </nav>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
