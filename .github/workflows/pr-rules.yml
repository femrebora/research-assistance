name: pr-rules

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate PR title and description
    runs-on: ubuntu-latest
    steps:
      - name: Enforce PR rules
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          title_regex='^(feat|fix|docs|refactor|test|chore|ci)(\([A-Za-z0-9._/-]+\))?: [^ ].*'
          required_headings=(
            "## Summary"
            "## Testing"
            "## Checklist"
          )
          required_checked_items=(
            "PR title format is valid"
            "Scope of this PR is focused and minimal"
            "Documentation was updated if behavior changed"
            "No secrets or sensitive data were added"
          )

          title_compact="${PR_TITLE//[[:space:]]/}"
          body_compact="${PR_BODY//[[:space:]]/}"

          if [[ -z "$title_compact" ]]; then
            echo "::error::PR title is required."
            exit 1
          fi

          if ! [[ "$PR_TITLE" =~ $title_regex ]]; then
            echo "::error::PR title must match '<type>: <short description>' or '<type>(optional-scope): <short description>' with exactly one space after ':' and a non-space description start (types: feat|fix|docs|refactor|test|chore|ci)."
            exit 1
          fi

          if [[ -z "$body_compact" ]]; then
            echo "::error::PR description is required and must follow the PR template."
            exit 1
          fi

          for heading in "${required_headings[@]}"; do
            if ! grep -Fq "$heading" <<<"$PR_BODY"; then
              echo "::error::PR description must include '$heading'."
              exit 1
            fi
          done

          for item in "${required_checked_items[@]}"; do
            if ! grep -Fq -- "- [x] ${item}" <<<"$PR_BODY" \
              && ! grep -Fq -- "- [X] ${item}" <<<"$PR_BODY" \
              && ! grep -Fq -- "* [x] ${item}" <<<"$PR_BODY" \
              && ! grep -Fq -- "* [X] ${item}" <<<"$PR_BODY"; then
              echo "::error::Checklist item '${item}' must be present and checked."
              exit 1
            fi
          done
